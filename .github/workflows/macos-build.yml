name: macOS Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: macos-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Validate and Build
    runs-on: macos-26
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Select Xcode 26.5
        run: |
          if [ -d /Applications/Xcode_26.5.0.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.5.0.app/Contents/Developer
          elif [ -d /Applications/Xcode_26.5.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.5.app/Contents/Developer
          else
            echo "Xcode 26.5 is not installed on this runner."
            ls -1 /Applications | grep Xcode || true
            exit 1
          fi

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version

      - name: Validate project metadata
        run: ./scripts/validate_project.py

      - name: Build GarethVideoCam
        run: |
          set -o pipefail
          xcodebuild \
            -project GarethVideoCam.xcodeproj \
            -scheme GarethVideoCam \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            build 2>&1 | tee build.log

      - name: Scan build log for source warnings
        run: |
          filtered_warnings="$(
            grep -E "warning:|deprecated|error:" build.log \
              | grep -v "appintentsmetadataprocessor" \
              | grep -v "Metadata extraction skipped. No AppIntents.framework dependency found." \
              || true
          )"

          if [ -n "$filtered_warnings" ]; then
            echo "$filtered_warnings"
            exit 1
          fi
