name: macOS Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: macos-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Validate and Build
    runs-on: macos-26
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.2

      - name: Select Xcode 26.5
        run: |
          if [ -d /Applications/Xcode_26.5.0.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.5.0.app/Contents/Developer
          elif [ -d /Applications/Xcode_26.5.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.5.app/Contents/Developer
          else
            echo "Xcode 26.5 is not installed on this runner."
            ls -1 /Applications | grep Xcode || true
            exit 1
          fi

      - name: Show toolchain
        run: |
          sw_vers
          xcode-select -p
          xcodebuild -version
          swift --version
          xcrun --sdk macosx --show-sdk-version
          xcrun --sdk macosx --show-sdk-path

      - name: Run local validation baseline
        run: make check

      - name: Build GarethVideoCam
        run: ./scripts/build_unsigned.sh

      - name: Verify build products
        run: ./scripts/verify_build_products.sh

      - name: Scan Xcode logs for warnings and failures
        if: always() && hashFiles('.build/Xcode/Logs/build-*.log') != ''
        run: ./scripts/scan_build_log.py .build/Xcode/Logs/build-*.log

      - name: Upload Xcode build logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: xcode-build-logs
          path: .build/Xcode/Logs/build-*.log
          if-no-files-found: ignore
