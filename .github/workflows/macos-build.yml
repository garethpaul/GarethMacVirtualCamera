name: macOS Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: macos-build-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Validate and Build
    runs-on: macos-26
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Select Xcode 26.5
        run: |
          if [ -d /Applications/Xcode_26.5.0.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.5.0.app/Contents/Developer
          elif [ -d /Applications/Xcode_26.5.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.5.app/Contents/Developer
          else
            echo "Xcode 26.5 is not installed on this runner."
            ls -1 /Applications | grep Xcode || true
            exit 1
          fi

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version

      - name: Run local validation baseline
        run: make check

      - name: Build GarethVideoCam
        run: ./scripts/build_unsigned.sh

      - name: Verify build products
        run: ./scripts/verify_build_products.sh

      - name: Scan build log for source warnings
        run: ./scripts/scan_build_log.py build-Debug.log build-Release.log

      - name: Upload Xcode build logs
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: xcode-build-logs
          path: build-*.log
          if-no-files-found: ignore
