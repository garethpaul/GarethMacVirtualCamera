<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Gareth Mac Virtual Camera project overview</title>
  <desc id="desc">Overview of the SwiftUI host app, embedded CoreMediaIO camera extension, validation workflow, and signed runtime evidence path.</desc>
  <defs>
    <style>
      .label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { font-size: 18px; fill: #374151; }
      .body { font-size: 22px; fill: #111827; }
      .heading { font-size: 27px; font-weight: 700; fill: #111827; }
      .pill { font-size: 18px; font-weight: 700; fill: #111827; }
      .muted { fill: #6b7280; font-size: 18px; }
    </style>
  </defs>

  <rect width="1200" height="675" fill="#f6f7f9"/>
  <rect x="28" y="28" width="1144" height="619" rx="8" fill="#ffffff" stroke="#d6dae1" stroke-width="2"/>

  <rect x="56" y="56" width="1092" height="118" rx="8" fill="#111827"/>
  <text class="label" x="92" y="105" font-size="38" font-weight="800" fill="#ffffff">Gareth Mac Virtual Camera</text>
  <text class="label" x="92" y="143" font-size="21" fill="#d1d5db">SwiftUI host app plus CoreMediaIO camera extension publishing a bundled MP4 as Gareth Video Cam.</text>

  <g transform="translate(76 220)">
    <rect x="0" y="0" width="300" height="126" rx="8" fill="#eef2ff" stroke="#c7d2fe"/>
    <circle cx="40" cy="42" r="22" fill="#4f46e5"/>
    <path d="M31 34h32v24H31z" fill="#ffffff"/>
    <circle cx="41" cy="46" r="5" fill="#4f46e5"/>
    <text class="label heading" x="78" y="43">Host App</text>
    <text class="label small" x="78" y="76">GarethVideoCam.app</text>
    <text class="label small" x="78" y="103">runs from /Applications</text>
  </g>

  <path d="M400 283h42" stroke="#9ca3af" stroke-width="5" stroke-linecap="round"/>
  <path d="M429 268l23 15-23 15z" fill="#9ca3af"/>

  <g transform="translate(452 220)">
    <rect x="0" y="0" width="300" height="126" rx="8" fill="#ecfdf5" stroke="#a7f3d0"/>
    <circle cx="40" cy="42" r="22" fill="#059669"/>
    <path d="M30 35h40v10H30zm0 17h40v10H30z" fill="#ffffff"/>
    <text class="label heading" x="78" y="43">CMIO Extension</text>
    <text class="label small" x="78" y="76">embedded system extension</text>
    <text class="label small" x="78" y="103">streams bundled MP4</text>
  </g>

  <path d="M776 283h42" stroke="#9ca3af" stroke-width="5" stroke-linecap="round"/>
  <path d="M805 268l23 15-23 15z" fill="#9ca3af"/>

  <g transform="translate(828 220)">
    <rect x="0" y="0" width="300" height="126" rx="8" fill="#fff7ed" stroke="#fed7aa"/>
    <circle cx="40" cy="42" r="22" fill="#ea580c"/>
    <circle cx="40" cy="42" r="11" fill="#ffffff"/>
    <circle cx="40" cy="42" r="5" fill="#ea580c"/>
    <text class="label heading" x="78" y="43">Virtual Camera</text>
    <text class="label small" x="78" y="76">Gareth Video Cam</text>
    <text class="label small" x="78" y="103">visible after approval</text>
  </g>

  <g transform="translate(76 404)">
    <rect x="0" y="0" width="330" height="144" rx="8" fill="#f9fafb" stroke="#d1d5db"/>
    <text class="label heading" x="26" y="42">Current Target</text>
    <text class="label body" x="26" y="76">Xcode 26.5 / macOS 26.5 SDK</text>
    <text class="label body" x="26" y="106">Swift 6, macOS 14.0 or later</text>
  </g>

  <g transform="translate(434 404)">
    <rect x="0" y="0" width="330" height="144" rx="8" fill="#f9fafb" stroke="#d1d5db"/>
    <text class="label heading" x="26" y="42">Validation</text>
    <text class="label body" x="26" y="76">check_project.sh plus CI build</text>
    <text class="label body" x="26" y="106">bundle, signing, video metadata</text>
  </g>

  <g transform="translate(792 404)">
    <rect x="0" y="0" width="330" height="144" rx="8" fill="#f9fafb" stroke="#d1d5db"/>
    <text class="label heading" x="26" y="42">Runtime Evidence</text>
    <text class="label body" x="26" y="76">signed host, entitlement, approval</text>
    <text class="label body" x="26" y="106">diagnostics and camera inventory</text>
  </g>

  <g transform="translate(76 590)">
    <rect x="0" y="-30" width="340" height="42" rx="8" fill="#e0f2fe" stroke="#7dd3fc"/>
    <text class="label pill" x="18" y="-4">com.garethpaul.GarethVideoCam</text>
    <rect x="440" y="-30" width="290" height="42" rx="8" fill="#dcfce7" stroke="#86efac"/>
    <text class="label pill" x="458" y="-4">GarethVideoCam.Extension</text>
    <text class="label muted" x="772" y="-4">Documented gates: build, validation, activation.</text>
  </g>
</svg>
